version: 2.1

jobs:
  build:
    docker:
      - image: alexfalkowski/ruby:2.6
    steps:
      - checkout:
          method: blobless
      - run: git submodule sync
      - run: git submodule update --init
      - restore_cache:
          name: restore deps
          keys:
            - bin-ruby-cache-{{ checksum "Gemfile.lock" }}
            - bin-ruby-cache-
      - run: make dep
      - run: make clean-dep
      - save_cache:
          name: save deps
          key: bin-ruby-cache-{{ checksum "Gemfile.lock" }}
          paths:
            - vendor
      - run: make scripts-lint
      - run: make docker-lint
      - run: make lint
      - run: make sec-lint
    resource_class: arm.large
  sync:
    docker:
      - image: alexfalkowski/release:7.7
    steps:
      - checkout:
          method: blobless
      - run: git submodule sync
      - run: git submodule update --init
      - run: make sync push
    resource_class: arm.large
  version:
    docker:
      - image: alexfalkowski/release:7.7
    steps:
      - checkout:
          method: blobless
      - run: git submodule sync
      - run: git submodule update --init
      - run: version
      - run: package
    resource_class: arm.large
  wait-all:
    docker:
      - image: alexfalkowski/ruby:2.6
    steps:
      - run: echo "all applicable jobs finished"
    resource_class: arm.large

workflows:
  bin:
    jobs:
      - build
      - sync:
          requires:
            - build
          filters:
            branches:
              ignore: master
      - version:
          context: gh
          serial-group: << pipeline.project.slug >>/version
          requires:
            - build
          filters:
            branches:
              only: master
      - wait-all:
          requires:
            - build
            - sync
            - version
