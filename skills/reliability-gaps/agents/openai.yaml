interface:
  display_name: "Reliability Gaps"
  short_description: "Find scoped SRE readiness gaps"
  default_prompt: "Use $reliability-gaps for scoped SRE, operability, overload, observability, release-safety, recovery, and data-integrity gaps. Treat remembered commands such as Start REL-1 and Approved REL-1 with agents and a goal as gap-workflow shorthand. Follow its active plan, use repo archetype lead generation before reliability filtering, apply the shared delegation gate, preserve confidence/validation/bin/** rules, write self-contained mini-RFC ledger entries with status/summary, What/Why/How, optional situation maps, evidence that explains claim/observation/reproduction before source locators, scoped proposals, alternatives, and success criteria, read long-running-work before substantial agreed reliability work, preserve the solution-agreement and fresh-review gates, account for rejected/routed leads, handle RELIABILITY.md and audit-incomplete/no-finding output, answer reliability gap ID follow-ups such as REL-1, fix agreed gaps, and report TDD details when behavior changes, pasting red and green as actual command output using the same selector before and after implementation and never relabeling test-after as TDD."
