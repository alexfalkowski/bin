interface:
  display_name: "Reliability Gaps"
  short_description: "Find scoped SRE readiness gaps"
  default_prompt: "Use $reliability-gaps with its active plan, runtime goals only when authorized, and shared gap workflow to find scoped reliability gaps through delegated review when permitted; do not require the human to ask for agents, sub-agents, delegation, or parallel work before using sub-agents when the active runtime provides and permits them, use sub-agents when they materially improve coverage, confidence, throughput, independent validation, forward-testing, or disjoint implementation, stop at the delegation gate instead of offering a local-only pass when delegation is needed for coverage, confidence, throughput, independent validation, forward-testing, or disjoint implementation, ask permission only for approval-gated commands or remote/destructive actions, use local review only when the shared gap workflow allows it and delegation would not materially improve coverage, confidence, throughput, independent validation, forward-testing, or disjoint implementation, track inventory/slice coverage plus validation evidence and confidence, exclude downstream bin/** unless explicitly scoped to shared tooling, store only confirmed gaps in RELIABILITY.md, create no ledger when there are no confirmed gaps, answer reliability gap ID follow-ups such as REL-1, and implement agreed fixes. For behavior-changing fixes, report the TDD decision plus Red, Green, Refactor, and Validation; otherwise use the appropriate docs/config validation path."
