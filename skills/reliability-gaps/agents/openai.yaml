interface:
  display_name: "Reliability Gaps"
  short_description: "Find scoped SRE readiness gaps"
  default_prompt: "Use $reliability-gaps with its active plan, runtime goals only when authorized, and shared gap workflow to find scoped reliability gaps; apply the shared delegation gate, track inventory/slice coverage plus validation evidence, finding confidence, coverage confidence, and scope no-finding confidence; for confidence closure requests, use the requested percentage as the no-finding threshold without going below mandatory confidence floors, reject 100% as unachievable, and require every relevant slice to be deep or excluded, current CI or equivalent validation evidence, delegated coverage when needed, and a final challenge pass before any no-finding closeout; exclude downstream bin/** unless explicitly scoped to shared tooling; store only confirmed gaps in RELIABILITY.md; create no ledger when there are no confirmed gaps, but use Audit incomplete: no confirmed findings so far when broad-scope coverage is deferred, skimmed, or blocked; answer reliability gap ID follow-ups such as REL-1, and implement agreed fixes. For behavior-changing fixes, report the TDD decision plus Red, Green, Refactor, and Validation; otherwise use the appropriate docs/config validation path."
