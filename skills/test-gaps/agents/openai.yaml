interface:
  display_name: "Test Gaps"
  short_description: "Find weak tests and harness gaps"
  default_prompt: "Use $test-gaps with its active plan, runtime goals only when authorized, and shared gap workflow to find scoped missing, weak, misleading, flaky, wrong-layer, or test-harness coverage gaps through delegated review when permitted; do not require the human to ask for agents, sub-agents, delegation, or parallel work before using sub-agents when the active runtime provides and permits them, use sub-agents when they materially improve coverage, confidence, throughput, independent validation, forward-testing, or disjoint implementation, stop at the delegation gate instead of offering a local-only pass when delegation is needed for coverage, confidence, throughput, independent validation, forward-testing, or disjoint implementation, ask permission only for approval-gated commands or remote/destructive actions, use local review only when the shared gap workflow allows it and delegation would not materially improve coverage, confidence, throughput, independent validation, forward-testing, or disjoint implementation; exclude downstream bin/** unless explicitly scoped to shared tooling; reject implementation-only or no-front-door candidates; store confirmed gaps in TESTS.md; answer test gap ID follow-ups such as TEST-1; or implement agreed test fixes one gap at a time."
