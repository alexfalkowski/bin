interface:
  display_name: "Test Gaps"
  short_description: "Find weak tests and harness gaps"
  default_prompt: "Use $test-gaps for scoped missing, weak, misleading, flaky, wrong-layer, or harness coverage gaps. Treat remembered commands such as Work TEST-1 and Agent goal work TEST-1 as gap-workflow shorthand. Follow its active plan, use repo archetype lead generation before coverage filtering, apply the shared delegation gate, preserve confidence/validation/bin/** rules, write readable mini-RFC ledger entries with a status/summary header, context, evidence/reproduction blocks, a proposal with alternatives considered, and a definition of success, read long-running-work before substantial agreed test work, preserve the solution-agreement and fresh-review gates, verify front-door and repository-owned behavior, account for rejected/routed leads, report TDD/Red/Green/Refactor details when behavior changes, pasting red and green as actual command output using the same selector before and after implementation and never relabeling test-after as TDD, store TESTS.md, answer test gap ID follow-ups such as TEST-1, and fix one agreed gap."
