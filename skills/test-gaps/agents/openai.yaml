interface:
  display_name: "Test Gaps"
  short_description: "Find weak tests and harness gaps"
  default_prompt: "Use $test-gaps with its active plan, runtime goals only when authorized, and shared gap workflow to find scoped missing, weak, misleading, flaky, wrong-layer, or test-harness coverage gaps through authorized delegation when permitted; ask for explicit delegation permission when runtime requires it, use local review only when the shared gap workflow allows it and the required confidence threshold can still be met; exclude downstream bin/** unless explicitly scoped to shared tooling; reject implementation-only or no-front-door candidates; store confirmed gaps in TESTS.md; answer test gap ID follow-ups such as TEST-1; or implement agreed test fixes one gap at a time."
