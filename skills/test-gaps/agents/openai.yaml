interface:
  display_name: "Test Gaps"
  short_description: "Find weak tests and harness gaps"
  default_prompt: "Use $test-gaps with its active plan, runtime goals only when authorized, and shared gap workflow to find scoped missing, weak, misleading, flaky, wrong-layer, or test-harness coverage gaps; apply the shared delegation gate; for confidence closure requests, use the requested percentage as the no-finding threshold without going below mandatory confidence floors, reject 100% as unachievable, and require every relevant slice to be deep or excluded, current CI or equivalent validation evidence, delegated coverage when needed, and a final challenge pass before any no-finding closeout; exclude downstream bin/** unless explicitly scoped to shared tooling; reject implementation-only or no-front-door candidates; store confirmed gaps in TESTS.md; answer test gap ID follow-ups such as TEST-1; or implement agreed test fixes one gap at a time."
