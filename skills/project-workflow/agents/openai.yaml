interface:
  display_name: "Project Workflow"
  short_description: "Discover commands, CI, bin wiring, and local patterns"
  default_prompt: "Use $project-workflow to discover project entrypoints, CI expectations, ./bin wiring, shared Makefile fragment behavior, local code/test/config/validation patterns, and the non-interactive login-shell command environment (`zsh -lc '<command>'` for zsh) before work begins. For Makefiles, treat target comments as the external command catalog, treat uncommented targets as internal, and keep .PHONY selective rather than adding it to every target. Classify command failures before retrying, and never replace a failed repo command with an ad hoc command merely to make progress. Treat AGENTS.md and selected skills as mandatory rules."
