interface:
  display_name: "Code Issues Implement"
  short_description: "Implement agreed code-issue fixes"
  default_prompt: "Use $code-issues-implement only after Start <ID> or Approved <ID>-N (or a same-prefix batch) for a scoped code-issue ledger entry. Re-check the entry against current code before proposing a fix, present the decision card, apply the shared delegation gate, resolve entry ID follow-ups through ledger.yaml, and implement only after explicit agreement to a specific proposal."
