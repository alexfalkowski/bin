interface:
  display_name: "Ruby Standards"
  short_description: "Apply Ruby code, docs, and test conventions"
  default_prompt: "Use $ruby-standards when changing Ruby code or Ruby documentation in this repository, pairing with $naming-standards when names or renames are part of the change and $doc-standards for RDoc. RDoc must add purpose, contract, exceptions, examples, or constraints rather than repeat code; README examples should focus on first-use workflows while reusable API behavior belongs in RDoc or executable specs/features. Alias docs should state project-owned surface/import reduction and point to canonical docs. Keep implementation contracts as simple as the supported path allows; do not add nil guards, idempotency, synchronization, rescue paths, coercions, or fallback behavior for merely imaginable misuse. Do not extract one-line helpers, wrappers, modules, service objects, or callbacks unless they add domain clarity, boundary ownership, compatibility, non-obvious semantics, repeated tricky logic, or an established local pattern. Before changing documented Ruby APIs, sketch the intended call site or command invocation first. When test coverage is needed, do not assume Ruby tests; pair with $testing-standards and follow the majority relevant existing harness."
