interface:
  display_name: "Feature Gaps"
  short_description: "Find product feature opportunities"
  default_prompt: "Use $feature-gaps with its active plan, runtime goals only when authorized, and shared gap workflow to find scoped main product capability gaps; apply the shared delegation gate; reproduce candidates with the smallest supported user action, workflow trace, product surface lookup, or authoritative comparison before recording; for confidence closure requests, use the requested percentage as the no-finding threshold without going below mandatory confidence floors, reject 100% as unachievable, and require every relevant slice to be deep or excluded, current CI or equivalent validation evidence, delegated coverage when needed, and a final challenge pass before any no-finding closeout; require explicit audience benefit, exclude downstream bin/** unless explicitly scoped to shared tooling, store confirmed proposals in FEATURES.md, answer feature ID follow-ups such as FEATURE-1, or propose and implement explicitly agreed product feature changes one at a time; route test and project workflow gaps to their own skills."
