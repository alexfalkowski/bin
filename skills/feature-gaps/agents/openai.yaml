interface:
  display_name: "Feature Gaps"
  short_description: "Find product feature opportunities"
  default_prompt: "Use $feature-gaps with its active plan, runtime goals only when authorized, and shared gap workflow to find scoped main product capability gaps through authorized delegation when permitted; ask for explicit delegation permission when runtime requires it, use local review only when the shared gap workflow allows it and the required confidence threshold can still be met, require explicit audience benefit, exclude downstream bin/** unless explicitly scoped to shared tooling, store confirmed proposals in FEATURES.md, answer feature ID follow-ups such as FEATURE-1, or propose and implement explicitly agreed product feature changes one at a time; route test and project workflow gaps to their own skills."
