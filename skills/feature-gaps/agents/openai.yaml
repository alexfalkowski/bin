interface:
  display_name: "Feature Gaps"
  short_description: "Find product feature opportunities"
  default_prompt: "Use $feature-gaps for scoped product-facing capability opportunities with explicit audience benefit. Treat remembered commands such as Work FEATURE-1 and Agent goal work FEATURE-1 as gap-workflow shorthand. Follow its active plan, use repo archetype lead generation before acceptance-gate filtering, apply the shared delegation gate, preserve confidence/validation/bin/** rules, write readable ledger entries with summary tables, workflow maps, evidence/reproduction blocks, decision traces, and Proposed Change YAML, use the implementation proposal gate decision packet with Solution Shape first before asking for feature approval, read long-running-work before substantial agreed features, preserve the solution-agreement and fresh-review gates, for behavior-changing features observe and paste the red before implementation and report red/green as actual command output using the same selector without relabeling test-after as TDD, account for rejected/routed leads, store FEATURES.md proposals, answer feature ID follow-ups such as FEATURE-1, fix one agreed feature, and route test/project gaps elsewhere."
