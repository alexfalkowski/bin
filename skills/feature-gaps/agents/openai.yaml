interface:
  display_name: "Feature Gaps"
  short_description: "Find product feature opportunities"
  default_prompt: "Use $feature-gaps for scoped product-facing capability opportunities with explicit audience benefit. Treat remembered commands such as Work FEATURE-1 and Agent goal work FEATURE-1 as gap-workflow shorthand. Follow its active plan, use repo archetype lead generation before acceptance-gate filtering, apply the shared delegation gate, preserve confidence/validation/bin/** rules, read long-running-work before substantial agreed features, preserve the solution-agreement and fresh-review gates, account for rejected/routed leads, store FEATURES.md proposals, answer feature ID follow-ups such as FEATURE-1, fix one agreed feature, and route test/project gaps elsewhere."
