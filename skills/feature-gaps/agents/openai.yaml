interface:
  display_name: "Feature Gaps"
  short_description: "Find product feature opportunities"
  default_prompt: "Use $feature-gaps for scoped product-facing capability opportunities with explicit audience benefit. Treat remembered commands such as Start FEATURE-1 and Approved FEATURE-1 with agents and a goal as gap-workflow shorthand. Follow its active plan, use repo archetype lead generation before acceptance-gate filtering, apply the shared delegation gate, preserve confidence/validation/bin/** rules, write readable mini-PRD ledger entries with a status/summary header, context, evidence/reproduction blocks, a proposal with alternatives considered, and a definition of success, use the implementation proposal gate decision packet with Solution Shape first before asking for feature approval, read long-running-work before substantial agreed features, preserve the solution-agreement and fresh-review gates, for behavior-changing features observe and paste the red before implementation and report red/green as actual command output using the same selector without relabeling test-after as TDD, account for rejected/routed leads, store FEATURES.md proposals, answer feature ID follow-ups such as FEATURE-1, fix one agreed feature, and route test/project gaps elsewhere."
