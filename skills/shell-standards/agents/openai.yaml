interface:
  display_name: "Shell Standards"
  short_description: "Apply Bash, ShellCheck, and script documentation conventions"
  default_prompt: "Use $shell-standards for shell scripts, shell docs, ShellCheck behavior, text processing, directory scope, and functions. Pair with $naming-standards and $doc-standards as needed; comments must explain purpose or quirks, one-line wrappers need real value, and tests should follow $testing-standards plus the dominant harness."
