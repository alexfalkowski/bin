interface:
  display_name: "Shell Standards"
  short_description: "Apply Bash, ShellCheck, and script documentation conventions"
  default_prompt: "Use $shell-standards when changing shell scripts or shell documentation in this repository, pairing with $naming-standards when names or renames are part of the change and $doc-standards for script or function comments. Comments must explain purpose, constraints, or command quirks rather than obvious shell flow. Do not extract one-line shell functions or wrappers unless they add command clarity, boundary ownership, compatibility, non-obvious quoting/path/cleanup semantics, repeated tricky setup, or an established local pattern. When test coverage is needed, do not assume shell-native tests; pair with $testing-standards and follow the majority relevant existing harness."
