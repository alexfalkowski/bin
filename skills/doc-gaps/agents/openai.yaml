interface:
  display_name: "Doc Gaps"
  short_description: "Find and fix scoped doc adequacy gaps"
  default_prompt: "Use $doc-gaps with $doc-standards for scoped documentation adequacy gaps. Treat remembered commands such as Work DOC-1 and Agent goal work DOC-1 as gap-workflow shorthand. Follow its active plan, use repo archetype lead generation before adequacy filtering, apply the shared delegation gate, preserve confidence/validation/bin/** rules, write readable mini-RFC ledger entries with a status/summary header, context, evidence/reproduction blocks, a proposal with alternatives considered, and a definition of success, read long-running-work before substantial agreed docs work, preserve the solution-agreement and fresh-review gates, account for rejected/routed leads, handle DOCS.md audit-only or unresolved findings, answer doc gap ID follow-ups such as DOC-1, and fix confirmed docs in one pass."
