interface:
  display_name: "Doc Gaps"
  short_description: "Find and fix scoped doc adequacy gaps"
  default_prompt: "Use $doc-gaps with its active plan, runtime goals only when authorized, shared gap workflow, and $doc-standards to run a one-pass scoped documentation gap workflow; apply the shared delegation gate; for confidence closure requests, apply the requested no-finding threshold without going below mandatory confidence floors, reject 100% as unachievable, and require every relevant slice to be deep or excluded, current CI or equivalent validation evidence, delegated coverage when needed, and a final challenge pass before any no-gap closeout; exclude downstream bin/** unless explicitly scoped to shared tooling, answer doc gap ID follow-ups such as DOC-1, apply confirmed doc fixes, validate, and write DOCS.md only for audit-only requests or unresolved gaps."
