interface:
  display_name: "Doc Gaps"
  short_description: "Find and fix scoped doc adequacy gaps"
  default_prompt: "Use $doc-gaps with its active plan, runtime goals only when authorized, shared gap workflow, and $doc-standards to run a one-pass scoped documentation gap workflow through authorized delegation when permitted; ask for explicit delegation permission when runtime requires it, use local review only when the shared gap workflow allows it and the required confidence threshold can still be met, exclude downstream bin/** unless explicitly scoped to shared tooling, answer doc gap ID follow-ups such as DOC-1, apply confirmed doc fixes, validate, and write DOCS.md only for audit-only requests or unresolved gaps."
