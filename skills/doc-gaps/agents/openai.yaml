interface:
  display_name: "Doc Gaps"
  short_description: "Find and fix scoped doc adequacy gaps"
  default_prompt: "Use $doc-gaps with its active plan, runtime goals only when authorized, shared gap workflow, and $doc-standards to run a one-pass scoped documentation gap workflow through delegated review when permitted; do not require the human to ask for agents, sub-agents, delegation, or parallel work before using sub-agents when the active runtime provides and permits them, use sub-agents when they materially improve coverage, confidence, throughput, independent validation, forward-testing, or disjoint implementation, stop at the delegation gate instead of offering a local-only pass when delegation is needed for coverage, confidence, throughput, independent validation, forward-testing, or disjoint implementation, ask permission only for approval-gated commands or remote/destructive actions, use local review only when the shared gap workflow allows it and delegation would not materially improve coverage, confidence, throughput, independent validation, forward-testing, or disjoint implementation, exclude downstream bin/** unless explicitly scoped to shared tooling, answer doc gap ID follow-ups such as DOC-1, apply confirmed doc fixes, validate, and write DOCS.md only for audit-only requests or unresolved gaps."
