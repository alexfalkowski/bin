interface:
  display_name: "Doc Gaps"
  short_description: "Find and fix scoped doc adequacy gaps"
  default_prompt: "Use $doc-gaps with $doc-standards for scoped documentation adequacy gaps. Treat remembered commands such as Start DOC-1 and Approved DOC-1 with agents and a goal as gap-workflow shorthand. Follow its active plan, use repo archetype lead generation before adequacy filtering, apply the shared delegation gate, preserve confidence/validation/bin/** rules, write self-contained mini-RFC ledger entries with status/summary, What/Why/How, optional situation maps, evidence that explains claim/observation/reproduction before source locators, scoped proposals, alternatives, and success criteria, read long-running-work before substantial agreed docs work, preserve the solution-agreement and fresh-review gates, account for rejected/routed leads, handle DOCS.md audit-only or unresolved findings, answer doc gap ID follow-ups such as DOC-1, and fix confirmed docs in one pass."
