interface:
  display_name: "Change Validation"
  short_description: "Choose tests, lint, and CI checks"
  default_prompt: "Use $change-validation to choose and report validation for this change. Prefer repository-defined commands through the initialized user shell, run supported area/package/file/scenario/example/test-name selectors before broad suites, classify failures before retrying, never replace a failed repo command with an ad hoc command merely to make progress, detect no-op wrappers, report tool/PATH mismatches as gaps, and rerun checks when file changes make prior validation stale."
