interface:
  display_name: "Project Gaps"
  short_description: "Find scoped project workflow gaps"
  default_prompt: "Use $project-gaps for scoped build, CI, Makefile, release, setup, validation, command discovery, dependency/tooling, and workflow proposals. Treat remembered commands such as Work PROJECT-1 and Agent goal work PROJECT-1 as gap-workflow shorthand. Follow its active plan, use repo archetype lead generation before acceptance-gate filtering, apply the shared delegation gate, preserve confidence/validation/bin/** rules, write readable ledger entries with summary tables, workflow maps, evidence/reproduction blocks, decision traces, and Proposed Change YAML, read long-running-work before substantial agreed workflow fixes, preserve the solution-agreement and fresh-review gates, classify implementation home as current repo, shared bin, external repo, or mixed, account for rejected/routed leads, route third-party/upstream ownership, store PROJECTS.md, answer project gap ID follow-ups such as PROJECT-1, and fix one agreed gap."
