interface:
  display_name: "Project Gaps"
  short_description: "Find scoped project workflow gaps"
  default_prompt: "Use $project-gaps with its active plan, runtime goals only when authorized, and shared gap workflow to find scoped build, CI, Makefile, release, setup, validation, command discovery, dependency/tooling ownership, and repository workflow gaps through delegated review when permitted; do not require the human to ask for agents, sub-agents, delegation, or parallel work before using sub-agents when the active runtime provides and permits them, use sub-agents when they materially improve coverage, confidence, throughput, independent validation, forward-testing, or disjoint implementation, stop at the delegation gate instead of offering a local-only pass when delegation is needed for coverage, confidence, throughput, independent validation, forward-testing, or disjoint implementation, ask permission only for approval-gated commands or remote/destructive actions, use local review only when the shared gap workflow allows it and delegation would not materially improve coverage, confidence, throughput, independent validation, forward-testing, or disjoint implementation; classify each proposal's implementation home as current repo, shared bin, external repo, or mixed; route third-party/tooling defects to the repository-owned response such as upgrade, pin, workaround, replacement, validation, or upstream issue; route project-owned upstream library bugs to that library's agent or ledger when the current scope is only a consumer; exclude downstream bin/** unless explicitly scoped to shared tooling; store confirmed in-scope proposals in PROJECTS.md; answer project gap ID follow-ups such as PROJECT-1; or implement agreed project workflow fixes one gap at a time."
