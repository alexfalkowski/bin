interface:
  display_name: "Project Gaps"
  short_description: "Find scoped project workflow gaps"
  default_prompt: "Use $project-gaps for scoped build, CI, Makefile, release, setup, validation, command discovery, dependency/tooling, and workflow proposals. Treat remembered commands such as Start PROJECT-1 and Approved PROJECT-1 with agents and a goal as gap-workflow shorthand. Follow its active plan, use repo archetype lead generation before acceptance-gate filtering, apply the shared delegation gate, preserve confidence/validation/bin/** rules, write self-contained mini-RFC ledger entries with status/summary, What/Why/How, optional situation maps, evidence that explains claim/observation/reproduction before source locators, scoped proposals, alternatives, and success criteria, read long-running-work before substantial agreed workflow fixes, preserve the solution-agreement and fresh-review gates, for behavior-changing workflow fixes report red/green as actual command output using the same selector before and after implementation and never relabel test-after as TDD, classify implementation home as current repo, shared bin, external repo, or mixed, account for rejected/routed leads, route third-party/upstream ownership, store PROJECTS.md, answer project gap ID follow-ups such as PROJECT-1, and fix one agreed gap."
