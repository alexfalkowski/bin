interface:
  display_name: "Project Gaps"
  short_description: "Find scoped project workflow gaps"
  default_prompt: "Use $project-gaps with its active plan, runtime goals only when authorized, and shared gap workflow to find scoped build, CI, Makefile, release, setup, validation, command discovery, dependency/tooling ownership, and repository workflow gaps; apply the shared delegation gate; for confidence closure requests, use the requested percentage as the no-finding threshold without going below mandatory confidence floors, reject 100% as unachievable, and require every relevant slice to be deep or excluded, current CI or equivalent validation evidence, delegated coverage when needed, and a final challenge pass before any no-finding closeout; classify each proposal's implementation home as current repo, shared bin, external repo, or mixed; route third-party/tooling defects to the repository-owned response such as upgrade, pin, workaround, replacement, validation, or upstream issue; route project-owned upstream library bugs to that library's agent or ledger when the current scope is only a consumer; exclude downstream bin/** unless explicitly scoped to shared tooling; store confirmed in-scope proposals in PROJECTS.md; answer project gap ID follow-ups such as PROJECT-1; or implement agreed project workflow fixes one gap at a time."
