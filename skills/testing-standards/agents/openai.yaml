interface:
  display_name: "Testing Standards"
  short_description: "Design focused behavior tests"
  default_prompt: "Use $testing-standards to design or review focused tests for this change. For behavior changes, state the TDD/test-first decision before production edits, prefer public or documented entrypoints, and report the red/green/refactor trace. Do not write private-surface tests unless you first explain why the behavior cannot be covered publicly and get human agreement."
