interface:
  display_name: "Testing Standards"
  short_description: "Design focused behavior tests"
  default_prompt: "Use $testing-standards to design or review focused behavior tests. Treat TDD as a design feedback loop for executable behavior and caller-facing interfaces. MUST identify the dominant relevant existing test harness before editing and whether the change has executable behavior; stop when tests would invent API shape; do not use source-inspection tests to prove implementation absence unless it is lint/static-analysis policy; do not force TDD for docs/config/policy/metadata or shell/Make glue without an established harness; stop on unexpected green tests; treat human test-removal requests as coverage decisions; and report TDD decision, red, green, refactor, and validation when a test harness applies."
