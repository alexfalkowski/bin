interface:
  display_name: "Testing Standards"
  short_description: "Design focused behavior tests"
  default_prompt: "Use $testing-standards to design or review focused behavior tests. MUST identify the dominant relevant existing test harness before editing, plus caller/front door, executable behavior, and narrowest supported selector; avoid API-shaping, implementation-only, source-inspection, cryptic, and wrong-layer tests; stop on unexpected green tests; treat test-removal requests as coverage decisions; confirm the harness is runnable and observe/paste the red (command + failing output) before any production edit; run a two-pass Refactor assessment, use a third pass for shared, public, compatibility-sensitive, security-sensitive, release, or CI workflow changes, and report TDD decision, red, green, refactor, and validation when a harness applies, pasting the actual command and output for red and green using the same selector and never relabeling test-after as TDD."
