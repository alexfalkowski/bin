interface:
  display_name: "Testing Standards"
  short_description: "Design focused behavior tests"
  default_prompt: "Use $testing-standards to design or review focused behavior tests for this change. First identify the majority relevant existing test harness; do not infer test language from implementation language, and follow cross-language harnesses when they own the behavior. For behavior changes, state the TDD/test-first decision before production edits, prefer public or documented entrypoints, run a mutation-style gap scan, verify coverage claims when practical, and report the red/green/refactor trace. Do not write private-surface tests unless you first explain why the behavior cannot be covered publicly and get human agreement."
