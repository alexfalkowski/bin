interface:
  display_name: "Testing Standards"
  short_description: "Design focused behavior tests"
  default_prompt: "Use $testing-standards to design or review focused behavior tests. Treat TDD as a design feedback loop for executable behavior and caller-facing interfaces. MUST identify the dominant relevant existing test harness before editing, plus the real caller/front door and whether the change has executable behavior; use the narrowest supported package/file/scenario/example/focus/test-name selector for fast feedback without changing layers; stop when tests would invent API shape or bind to a convenient public implementation seam; do not test implementation-only optimizations unless they change observable contracts; do not use source-inspection tests to prove implementation absence unless it is lint/static-analysis policy; do not add cryptic tests that only prove internal order, provider wiring, dependency call shape, or timing for behavior-preserving fixes; use validation and a short intent comment when warranted; do not force TDD for docs/config/policy/metadata or shell/Make glue without an established harness; stop on unexpected green tests; treat human test-removal requests as coverage decisions; after first green, run a two-pass Refactor assessment that scrutinizes production code and tests for smells, duplication, long methods, conditionals, data clumps, primitive obsession, unnecessary abstraction, coupling, naming, and test readability before reporting refactor; use a third pass for shared, public, compatibility-sensitive, security-sensitive, release, or CI workflow changes; and report TDD decision, red, green, refactor, and validation when a test harness applies."
