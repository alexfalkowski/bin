interface:
  display_name: "Code Issues"
  short_description: "Find scoped code defects and risks"
  default_prompt: "Use $code-issues for scoped bug, security, compatibility, or public-contract issue ledgers. Treat remembered commands such as Work ISSUE-1 and Agent goal work ISSUE-1 as gap-workflow shorthand. Follow its active plan, use repo archetype lead generation before filtering candidates, apply the shared delegation gate, preserve confidence/validation/bin/** rules, write readable ledger entries with summary tables, evidence/reproduction blocks, decision traces, and Proposed Change YAML, read long-running-work before substantial agreed fixes, preserve the solution-agreement and fresh-review gates, account for rejected/routed leads, report TDD/Red/Green/Refactor details when behavior changes, handle ISSUES.md and no-finding/audit-incomplete output, answer issue ID follow-ups such as ISSUE-1, and fix one agreed issue at a time."
