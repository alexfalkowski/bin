interface:
  display_name: "Code Issues"
  short_description: "Find scoped code defects and risks"
  default_prompt: "Use $code-issues with its active plan, runtime goals only when authorized, and shared gap workflow to find scoped code issues; apply the shared delegation gate, track inventory/slice coverage plus validation evidence, finding confidence, coverage confidence, and scope no-finding confidence; exclude downstream bin/** unless explicitly scoped to shared tooling; store only confirmed findings in that scope's ISSUES.md; create no ledger when there are no confirmed findings, but use Audit incomplete: no confirmed findings so far when broad-scope coverage is deferred, skimmed, or blocked; answer issue ID follow-ups such as ISSUE-1, or propose and implement explicitly agreed fixes one code issue at a time."
