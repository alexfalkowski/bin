interface:
  display_name: "Code Issues"
  short_description: "Find scoped code defects and risks"
  default_prompt: "Use $code-issues with its active plan, runtime goals only when authorized, and shared gap workflow to find scoped code issues through delegated review when permitted; do not require the human to ask for agents, sub-agents, delegation, or parallel work before using sub-agents when the active runtime provides and permits them, use sub-agents when they materially improve coverage, confidence, throughput, independent validation, forward-testing, or disjoint implementation, stop at the delegation gate instead of offering a local-only pass when delegation is needed for coverage, confidence, throughput, independent validation, forward-testing, or disjoint implementation, ask permission only for approval-gated commands or remote/destructive actions, use local review only when the shared gap workflow allows it and delegation would not materially improve coverage, confidence, throughput, independent validation, forward-testing, or disjoint implementation, track inventory/slice coverage plus validation evidence and confidence, exclude downstream bin/** unless explicitly scoped to shared tooling, store only confirmed findings in that scope's ISSUES.md, create no ledger when there are no confirmed findings, answer issue ID follow-ups such as ISSUE-1, or propose and implement explicitly agreed fixes one code issue at a time."
