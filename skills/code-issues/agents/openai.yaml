interface:
  display_name: "Code Issues"
  short_description: "Find scoped code defects and risks"
  default_prompt: "Use $code-issues for scoped bug, security, compatibility, or public-contract issue ledgers. Treat remembered commands such as Work ISSUE-1 and Agent goal work ISSUE-1 as gap-workflow shorthand. Follow its active plan, use repo archetype lead generation before filtering candidates, apply the shared delegation gate, preserve confidence/validation/bin/** rules, write readable mini-RFC ledger entries with a status/summary header, context, evidence/reproduction blocks, a proposal with alternatives considered, and a definition of success, read long-running-work before substantial agreed fixes, preserve the solution-agreement and fresh-review gates, account for rejected/routed leads, report TDD/Red/Green/Refactor details when behavior changes, pasting red and green as actual command output using the same selector before and after implementation and never relabeling test-after as TDD, handle ISSUES.md and no-finding/audit-incomplete output, answer issue ID follow-ups such as ISSUE-1, and fix one agreed issue at a time."
