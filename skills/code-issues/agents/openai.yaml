interface:
  display_name: "Code Issues"
  short_description: "Find scoped code defects and risks"
  default_prompt: "Use $code-issues with its active plan, runtime goals only when authorized, and shared gap workflow to find scoped code issues; apply the shared delegation gate, track inventory/slice coverage plus validation evidence, finding confidence, coverage confidence, and scope no-finding confidence; reproduce candidates with the smallest supported command, test, workflow, trace, or lookup before recording; for confidence closure requests, use the requested percentage as the no-finding threshold without going below mandatory confidence floors, reject 100% as unachievable, and require every relevant slice to be deep or excluded, current CI or equivalent validation evidence, delegated coverage when needed, and a final challenge pass before any no-finding closeout; exclude downstream bin/** unless explicitly scoped to shared tooling; store only confirmed findings in that scope's ISSUES.md; create no ledger when there are no confirmed findings, but use Audit incomplete: no confirmed findings so far when broad-scope coverage is deferred, skimmed, or blocked; answer issue ID follow-ups such as ISSUE-1, or propose and implement explicitly agreed fixes one code issue at a time."
