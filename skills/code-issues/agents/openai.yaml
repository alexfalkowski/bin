interface:
  display_name: "Code Issues"
  short_description: "Find scoped code defects and risks"
  default_prompt: "Use $code-issues with its active plan, runtime goals only when authorized, and shared gap workflow to find scoped code issues through authorized delegation when permitted; ask for explicit delegation permission when runtime requires it, use local review only when the shared gap workflow allows it and the required confidence threshold can still be met, track inventory/slice coverage plus validation evidence and confidence, exclude downstream bin/** unless explicitly scoped to shared tooling, store only confirmed findings in that scope's ISSUES.md, create no ledger when there are no confirmed findings, answer issue ID follow-ups such as ISSUE-1, or propose and implement explicitly agreed fixes one code issue at a time."
