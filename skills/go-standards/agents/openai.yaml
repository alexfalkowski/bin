interface:
  display_name: "Go Standards"
  short_description: "Apply Go coding and testing conventions"
  default_prompt: "Use $go-standards when changing Go code in this repository, pairing with $naming-standards when names or renames are part of the change. Prefer external <package>_test tests through public entrypoints; before any internal Go test, explain why the public or documented entrypoint cannot cover the behavior and get human agreement. Before writing imports, inspect nearby files for existing package names and wrappers. Do not invent import aliases; use an alias only for a confirmed collision or required disambiguation. Preserve existing aliases unless explicitly asked to change them; flag questionable aliases for human review."
