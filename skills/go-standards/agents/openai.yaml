interface:
  display_name: "Go Standards"
  short_description: "Apply Go code, docs, and test conventions"
  default_prompt: "Use $go-standards when changing Go code or Go documentation in this repository, pairing with $naming-standards when names or renames are part of the change and $doc-standards for GoDoc. GoDoc must add contract, behavior, or constraints rather than repeat code; reusable API examples should prefer executable Go Example forms instead of README-only coverage; alias docs should state project-owned surface/import reduction and point to canonical docs. Keep implementation contracts as simple as the supported path allows; do not add nil guards, idempotency, synchronization, recovery, or fallback behavior for merely imaginable misuse. Do not extract one-line helpers, wrappers, interfaces, or packages unless they add domain clarity, boundary ownership, compatibility, non-obvious semantics, repeated tricky logic, or an established local pattern. Do not assume Go code needs Go tests; first identify the dominant relevant existing test harness, including cross-language harnesses. MUST NOT add Go *_test.go coverage when another harness owns the behavior unless the user asks or the behavior cannot be covered there; stop and explain before any exception. When writing or reviewing Go tests, benchmark functions MUST belong in benchmark_test.go and fuzz functions MUST belong in fuzz_test.go. Before changing exported APIs, sketch the intended Go caller first. Before writing imports, inspect nearby files for existing package names and wrappers. MUST NOT invent import aliases for readability, caution, brevity, or personal clarity; use an alias only for a confirmed collision, compile requirement, or established local pattern, and do not bypass wrapper packages with aliases such as stdtime when the wrapper should own the call."
