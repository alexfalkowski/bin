interface:
  display_name: "Go Standards"
  short_description: "Apply Go coding and testing conventions"
  default_prompt: "Use $go-standards when changing Go code in this repository, pairing with $naming-standards when names or renames are part of the change. Do not assume Go code needs Go tests; first identify the majority relevant existing test harness, including cross-language harnesses. Use Go *_test.go coverage when Go is the majority relevant layer, the changed surface is a Go package/API contract, or the user asks for Go-level coverage. Before any internal Go test, explain why the public or documented entrypoint cannot cover the behavior and get human agreement. Before writing imports, inspect nearby files for existing package names and wrappers. Do not invent import aliases; use an alias only for a confirmed collision or required disambiguation. Preserve existing aliases unless explicitly asked to change them; flag questionable aliases for human review."
