interface:
  display_name: "Go Standards"
  short_description: "Apply Go coding and testing conventions"
  default_prompt: "Use $go-standards when changing Go code in this repository, pairing with $naming-standards when names or renames are part of the change. Do not assume Go code needs Go tests; first identify the dominant relevant existing test harness, including cross-language harnesses. MUST NOT add Go *_test.go coverage when another harness owns the behavior unless the user asks or the behavior cannot be covered there; stop and explain before any exception. Before writing imports, inspect nearby files for existing package names and wrappers. MUST NOT invent import aliases for readability, caution, brevity, or personal clarity; use an alias only for a confirmed collision, compile requirement, or established local pattern."
