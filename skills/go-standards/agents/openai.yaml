interface:
  display_name: "Go Standards"
  short_description: "Apply Go code, docs, and test conventions"
  default_prompt: "Use $go-standards when changing Go code or Go documentation in this repository, pairing with $naming-standards when names or renames are part of the change and $doc-standards for GoDoc. GoDoc must add contract, behavior, or constraints rather than repeat code; alias docs should state project-owned surface/import reduction and point to canonical docs. Do not assume Go code needs Go tests; first identify the dominant relevant existing test harness, including cross-language harnesses. MUST NOT add Go *_test.go coverage when another harness owns the behavior unless the user asks or the behavior cannot be covered there; stop and explain before any exception. Before changing exported APIs, sketch the intended Go caller first. Before writing imports, inspect nearby files for existing package names and wrappers. MUST NOT invent import aliases for readability, caution, brevity, or personal clarity; use an alias only for a confirmed collision, compile requirement, or established local pattern, and do not bypass wrapper packages with aliases such as stdtime when the wrapper should own the call."
